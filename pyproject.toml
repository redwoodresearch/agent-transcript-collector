[project]
name = "claude-transcript-collector"
version = "0.1.0"
description = "Collect and share Claude Code transcripts with consent"
requires-python = ">=3.10"
dependencies = [
    "fastapi>=0.115",
    "uvicorn>=0.34",
    "jinja2>=3.1",
    "boto3>=1.35",
]

[project.scripts]
claude-transcript-collector = "claude_transcript_collector.app:main"

[build-system]
requires = ["hatchling"]
build-backend = "hatchling.build"

[dependency-groups]
dev = [
    "pytest>=8",
    "httpx>=0.28",
]
